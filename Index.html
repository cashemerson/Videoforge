<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>VideoForge Editor</title>

<!-- Core Styles -->
<link rel="stylesheet" href="css/core.css" />
<link rel="stylesheet" href="css/timeline.css" />
<link rel="stylesheet" href="css/panels.css" />
<link rel="stylesheet" href="css/inspector.css" />

<style>
/* Fallback if files fail to load */
body { background: #0d0d18; color: white; }
</style>

</head>

<body>

<!-- HEADER / TOP BAR -->
<header id="topbar">
  <div id="logo">VideoForge</div>
  <div id="projectName">My Project</div>

  <div id="toolbar">
    <button class="tb-btn" id="btnNew">New</button>
    <button class="tb-btn" id="btnImport">Import</button>
    <button class="tb-btn" id="btnExport">Export</button>
  </div>
</header>

<!-- MAIN EDITOR GRID -->
<div id="layout">

  <!-- LEFT PANEL: Media / Text / Effects -->
  <aside id="leftPanel">
    <div id="tabs">
      <button class="tab active" data-tab="media">Media</button>
      <button class="tab" data-tab="text">Text</button>
      <button class="tab" data-tab="effects">Effects</button>
    </div>

    <div id="tabContent">

      <!-- MEDIA TAB -->
      <div class="tabPane" id="pane-media" style="display:block;">
        <input type="file" id="mediaInput" multiple accept="video/*,image/*,audio/*" />
        <div id="mediaList"></div>
      </div>

      <!-- TEXT TAB -->
      <div class="tabPane" id="pane-text">
        <button id="addTextBtn">Add Text Layer</button>
      </div>

      <!-- EFFECTS TAB -->
      <div class="tabPane" id="pane-effects">
        <button class="effect-btn" data-preset="none">None</button>
        <button class="effect-btn" data-preset="bw">Black & White</button>
        <button class="effect-btn" data-preset="warm">Warm</button>
        <button class="effect-btn" data-preset="cool">Cool</button>
        <button class="effect-btn" data-preset="vivid">Vivid</button>
        <button class="effect-btn" data-preset="cinematic">Cinematic</button>
      </div>

    </div>
  </aside>

  <!-- PREVIEW AREA -->
  <main id="previewArea">
    <canvas id="previewCanvas" width="1920" height="1080"></canvas>

    <div id="playbackControls">
      <button id="btnPlay">Play</button>
      <button id="btnPause">Pause</button>
      <span id="timeDisplay">0.0s</span>
    </div>
  </main>

  <!-- RIGHT PANEL: INSPECTOR -->
  <aside id="inspectorPanel">
    <h3>Inspector</h3>
    <div id="inspectorContent">
      <p>No clip selected</p>
    </div>
  </aside>

  <!-- TIMELINE -->
  <section id="timelineWrapper">
    <div id="timelineTracks"></div>
  </section>

</div>

<!-- SCRIPTS -->
<script src="js/app.js"></script>
<script src="js/engine/media.js"></script>
<script src="js/engine/timeline.js"></script>
<script src="js/engine/render.js"></script>
<script src="js/engine/playback.js"></script>
<script src="js/engine/transitions.js"></script>
<script src="js/engine/effects.js"></script>
<script src="js/ui/panels.js"></script>
<script src="js/ui/toolbar.js"></script>
<script src="js/ui/inspector.js"></script>

</body>
</html>
